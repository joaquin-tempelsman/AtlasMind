name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@atlasmind.test"
          git config --global user.name "AtlasMind CI"

      - name: Set up kb_definitions for CI
        run: cp kb_definitions/kb_definitions.ci.md kb_definitions/kb_definitions.md

      - name: Run tests
        run: pytest tests/ -q
        env:
          OPENAI_API_KEY: dummy-key-for-tests
          TELEGRAM_BOT_TOKEN: ""
          VAULT_REPO_PATH: /tmp/vault

      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/AtlasMind
            git pull origin main
            .venv/bin/pip install -e ".[dev]" --quiet
            printf '%s | deployed %s\n' "$(git rev-parse --short HEAD)" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .deploy_stamp
            sudo systemctl restart atlasmind
            sleep 3
            echo "=== service status ==="
            systemctl is-active atlasmind
            echo "=== recent logs ==="
            sudo journalctl -u atlasmind -n 40 --no-pager
            echo "Deploy complete: $(cat .deploy_stamp)"
